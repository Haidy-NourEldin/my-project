<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Personal Course Organizer</h1>
        <p>Add a new course to your semester</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">My Courses</a></li>
            <li><a href="add.html">Add Course</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Create New Course Entry</h2>
            <form action="#">
                <div class="form-group">
                    <label for="cname">Course Name:</label><br>
                    <input type="text" id="cname" name="cname" required>
                </div>

                <div class="form-group">
                    <label for="instructor">Instructor Name:</label><br>
                    <input type="text" id="instructor" name="instructor" required>
                </div>

                <div class="form-group">
                    <label for="hours">Credit Hours:</label><br>
                    <input type="number" id="hours" name="hours" min="1" max="5" required>
                </div>

                <div class="form-group">
                    <label for="notes">Additional Notes:</label><br>
                    <textarea id="notes" name="notes" rows="4"></textarea>
                </div>

                <br>
                <button type="submit">Save Course</button>
                <button type="reset">Clear Form</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Copyright &copy; 2026 | Created by Haidy NourEldin</p>
    </footer>

</body>
</html>
